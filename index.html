<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday jeevi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="birthdaySong" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <section id="step1" class="page active">
            <h1 class="glow-text">Happy Birthday, jeevi</h1>
            <p>A cinematic journey created just for you</p>
            <button onclick="startJourney()">OPEN YOUR GIFT</button>
        </section>

        <section id="step2" class="page">
            <div class="card">
                <h2>It's Your Special Day</h2>
                <button onclick="nextStep(3)">NEXT</button>
            </div>
        </section>
<section id="step3" class="page">
    <h2 class="glow-text">Moments in Time</h2>
    <div class="photo-grid">
        <img src="img1.jpg" alt="Moment 1">
        <img src="img2.jpg" alt="Moment 2">
        <img src="img3.jpg" alt="Moment 3">
        <img src="img4.jpg" alt="Moment 4">
        <img src="img5.jpg" alt="Moment 5">
        <img src="img6.jpg" alt="Moment 6">
    </div>
    <button onclick="nextStep(4)">CONTINUE</button>
</section>
        
    </div>

    <script src="script.js"></script>
</body>
</html>
