<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Jeevi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="birthdaySong" preload="auto" loop>
        <source src="jbl.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <section id="step1" class="page active">
            <h1 class="glow-text">Happy Birthday, Jeevi</h1>
            <p>A cinematic journey created just for you</p>
            <button onclick="nextStep(2)">OPEN YOUR GIFT</button>
        </section>

        <section id="step2" class="page">
            <div class="card">
                <h2>Music makes it better...</h2>
                <button onclick="startMusic()">PLAY MUSIC</button>
            </div>
        </section>

        <section id="step3" class="page">
            <h2 class="glow-text">Moments in Time</h2>
            <div class="photo-grid">
                <img src="img1.jpg" alt="Moment 1">
                <img src="img2.jpg" alt="Moment 2">
                <img src="img3.jpg" alt="Moment 3">
                <img src="img4.jpg" alt="Moment 4">
            </div>
            <button onclick="nextStep(4)">CONTINUE</button>
        </section>

        <section id="step4" class="page">
            <div class="message-box">
                <h2>My Dearest Jeevi,</h2>
                <p>May your day be as beautiful as your smile. Nin dream ella ev year success agli, once again happy birthday madamji...</p>
                <button onclick="location.reload()">REPLAY THE MAGIC</button>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
