<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Riddhi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="birthdaySong" loop>
        <source src="your-song-file.mp3" type="audio/mpeg">
    </audio>

    <div class="stars-container"></div>

    <div class="container">
        <section id="step1" class="page active">
            <h1 class="glow-text">Happy Birthday, Riddhi</h1>
            <p>A cinematic journey created just for you</p>
            <button onclick="startJourney()">OPEN YOUR GIFT</button>
        </section>

        <section id="step2" class="page">
            <div class="card">
                <h2>It's Your Special Day</h2>
                <p>Ready for a surprise?</p>
                <button onclick="nextStep(3)">NEXT</button>
            </div>
        </section>

        <section id="step3" class="page">
            <div class="message-box">
                <h2>My Dearest Riddhi,</h2>
                <p>May your day be as beautiful as your smile.</p>
                <button onclick="location.reload()">REPLAY THE MAGIC</button>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
